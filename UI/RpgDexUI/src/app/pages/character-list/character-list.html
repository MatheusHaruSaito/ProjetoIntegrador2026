<div class="cl-wrapper">

  <div class="cl-header">
    <div>
      <h1 class="cl-title">Meus <span>Personagens</span></h1>
      <p class="cl-subtitle">Gerencie todas as fichas da sua coleção.</p>
    </div>
    <button class="btn-primary" routerLink="/personagens/novo">
      <i class="fa fa-plus"></i> Novo Personagem
    </button>
  </div>

  <div class="cl-table-wrapper">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Nome</th>
          <th>Descrição</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        @for (character of characterList; track character.id) {
          <tr>
            <td><span class="char-id">#{{ character.id }}</span></td>
            <td><span class="char-name">{{ character.name }}</span></td>
            <td><span class="char-desc">{{ character.description }}</span></td>
            <td>
              <div class="action-btns">
                <button class="btn-icon" title="Editar">
                  <i class="fa fa-pen"></i>
                </button>
                <button class="btn-icon danger" title="Excluir">
                  <i class="fa fa-trash"></i>
                </button>
              </div>
            </td>
          </tr>
        } @empty {
          <tr class="empty-row">
            <td colspan="4">
              <div class="empty-icon">🧙</div>
              <p class="empty-text">Nenhum personagem encontrado.</p>
              <p class="empty-sub">Crie seu primeiro personagem para começar.</p>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>

</div>
