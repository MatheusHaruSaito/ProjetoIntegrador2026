<div class="campaigns-wrapper">
  <div class="container">

    <!-- ── CAMPANHAS ── -->
    <h1 class="campaigns-title">Suas CAMPANHAS</h1>
    <div class="campaigns-grid">
      <div class="camp-card" *ngFor="let camp of myCampaigns">
        <img [src]="camp.imageUrl" [alt]="camp.name" class="camp-card__img">
        <div class="camp-card__overlay">
          <span>{{ camp.name }}</span>
        </div>
      </div>
      <button class="add-card" (click)="toggleModal()">
        <span class="add-card__icon">+</span>
      </button>
    </div>

    <!-- ── ACESSO RÁPIDO AOS PERSONAGENS ── -->
    <h2 class="section-title">Acesso Rápido</h2>
    <p class="section-sub">Seus personagens ordenados pelo último acesso.</p>

    <!-- Vazio -->
    <div class="char-empty" *ngIf="myCharacters.length === 0">
      <div class="char-empty__icon"><i class="fa fa-scroll"></i></div>
      <p class="char-empty__text">Nenhum personagem encontrado.</p>
      <a routerLink="/personagens" class="char-empty__link">
        <i class="fa fa-plus"></i> Criar personagem
      </a>
    </div>

    <!-- Grid de cards -->
    <div class="char-quick-grid" *ngIf="myCharacters.length > 0">
      <div
        class="char-quick-card"
        *ngFor="let char of myCharacters"
        (click)="openCharacter(char.id)"
      >
        <!-- Avatar -->
        <div
          class="char-quick-avatar"
          [style.background-image]="char.iconPath ? 'url(' + char.iconPath + ')' : ''"
        >
          <i class="fa fa-shield-halved" *ngIf="!char.iconPath"></i>
        </div>

        <!-- Info -->
        <div class="char-quick-info">
          <span class="char-quick-name">{{ char.name }}</span>
          <span class="char-quick-desc" *ngIf="char.description">{{ char.description }}</span>
        </div>

        <!-- Último acesso -->
        <div class="char-quick-meta">
          <span class="char-quick-time" [class.never]="!wasAccessed(char.id)">
            <i class="fa fa-clock"></i>
            {{ lastAccessedLabel(char.id) }}
          </span>
          <i class="fa fa-arrow-right char-quick-arrow"></i>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Modal Nova Campanha -->
<div class="modal-overlay" *ngIf="isModalOpen" (click)="toggleModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <button class="modal-close" (click)="toggleModal()">×</button>
    <h2 class="modal-title">Nova Campanha</h2>
    <p class="modal-sub">Defina o nome e a capa da sua nova aventura.</p>
    <div class="input-group">
      <input type="text" placeholder="Nome da Campanha">
    </div>
    <button class="btn-create" (click)="toggleModal()">CRIAR</button>
  </div>
</div>
