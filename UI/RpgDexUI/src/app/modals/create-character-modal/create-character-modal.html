@if (visible) {
  <div class="modal-backdrop" (click)="CloseModal()">
    <div class="modal-card" (click)="$event.stopPropagation()">

      <div class="modal-header">
        <h2 class="modal-title">Novo <span>Personagem</span></h2>
        <button class="btn-icon modal-close" (click)="CloseModal()">
          <i class="fa fa-xmark"></i>
        </button>
      </div>

      <div class="modal-body">

        <!-- Ícone -->
        <div class="input-group">
          <label class="input-label">Ícone do Personagem</label>
          <div class="icon-upload-area" (click)="iconInput.click()" [class.has-preview]="iconPreviewUrl">
            <img *ngIf="iconPreviewUrl" [src]="iconPreviewUrl" class="icon-preview-img" alt="Preview"/>
            <div class="icon-upload-placeholder" *ngIf="!iconPreviewUrl">
              <i class="fa fa-cloud-arrow-up"></i>
              <span>Clique para selecionar</span>
              <small>PNG, JPG • Máx. 2MB</small>
            </div>
            <div class="icon-upload-overlay" *ngIf="iconPreviewUrl">
              <i class="fa fa-camera"></i><span>Alterar</span>
            </div>
          </div>
          <input #iconInput type="file" accept="image/*" class="file-input-hidden" (change)="onIconSelected($event)"/>
        </div>

        <!-- Nome -->
        <div class="input-group">
          <label class="input-label">Nome <span class="required">*</span></label>
          <div class="input-field-wrapper">
            <i class="fa fa-user icon-field"></i>
            <input type="text" placeholder="Ex: Kael, o Errante"
              [(ngModel)]="newCharacter.name" name="charName" maxlength="60"/>
          </div>
        </div>

        <!-- Descrição -->
        <div class="input-group">
          <label class="input-label">Descrição <span class="field-optional">(opcional)</span></label>
          <textarea class="input-textarea"
            placeholder="Uma breve descrição do personagem. Você poderá detalhar tudo no editor."
            [(ngModel)]="newCharacter.description" name="charDesc"
            rows="3" maxlength="300"></textarea>
        </div>

        <p class="create-hint">
          <i class="fa fa-circle-info"></i>
          Após criar, você será levado ao editor completo para montar a ficha do personagem.
        </p>

        <div class="feedback-message error-message" *ngIf="errorMessage">
          <i class="fa fa-circle-exclamation"></i> {{ errorMessage }}
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn-secondary" (click)="CloseModal()" [disabled]="isLoading">Cancelar</button>
        <button class="btn-primary" (click)="CreateCharacter()" [disabled]="isLoading">
          <span *ngIf="!isLoading"><i class="fa fa-arrow-right"></i> Criar e Editar</span>
          <span *ngIf="isLoading"><i class="fa fa-spinner fa-spin"></i> Criando...</span>
        </button>
      </div>

    </div>
  </div>
}
